<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing Protocol | Wrapify</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #25D366;
            --bg: #05070a;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            position: relative;
        }

        /* 3D Circular Pulse */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            animation: ring-pulse 2s infinite ease-out;
            opacity: 0;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes ring-pulse {
            0% {
                width: 100px;
                height: 100px;
                opacity: 1;
                border-width: 5px;
            }

            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-width: 1px;
            }
        }

        .logo-wrap {
            position: relative;
            z-index: 10;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.3);
            animation: logo-float 2s infinite ease-in-out;
        }

        @keyframes logo-float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-10px) scale(1.05);
            }
        }

        .progress-box {
            margin-top: 60px;
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: loading 1.5s infinite linear;
        }

        @keyframes loading {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .status-text {
            margin-top: 20px;
            color: white;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
            animation: text-flicker 1.5s infinite alternate;
        }

        @keyframes text-flicker {
            0% {
                opacity: 0.2;
            }

            100% {
                opacity: 0.8;
                color: var(--accent);
            }
        }

        /* Matrix Rain Background Effect */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.1;
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div class="loader-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>

        <div class="logo-wrap">
            <img src="icon.jpg" alt="Logo" class="logo">
        </div>

        <div class="progress-box">
            <div class="progress-bar"></div>
        </div>
        <p class="status-text">Synchronizing Data</p>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = Array.from({ length: columns }, () => 1);

        const draw = () => {
            ctx.fillStyle = 'rgba(5, 7, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#25D366';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.width && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        // Auto-redirect to main site after loading
        window.addEventListener('load', () => {
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000); // 3 seconds loading feel
        });
    </script>
</body>

</html>
